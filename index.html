<style>
  body {
    background-color: #000000;
    font-family: 'Inter', sans-serif;
    color: #e2e2e2;
    min-height: max(884px, 100dvh);
  }
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  }
  .hide-scrollbar::-webkit-scrollbar { display: none; }
  .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

  /* Onboarding overlay */
  #onboarding-overlay { transition: opacity 0.2s ease; }
  #ob-step-2 { display: none; }
  #ob-step-2.active { display: flex; }
</style>

<body class="pb-32">

<!-- ===== ONBOARDING OVERLAY ===== -->
<div id="onboarding-overlay" class="fixed inset-0 z-40 bg-[#000000] flex flex-col overflow-y-auto">
  <div class="flex-1 flex flex-col px-4 pt-28 pb-32 relative">

    <!-- Step 1: 대분류 선택 -->
    <div id="ob-step-1" class="flex flex-col gap-6">
      <div class="text-center mb-2">
        <h2 class="text-2xl font-bold text-[#e2e2e2] tracking-tight leading-tight">어떤 곳에 취업하고 싶으세요?</h2>
        <p class="text-[#8e90a2] text-sm mt-2">직무에 맞는 자격증 번들을 추천해드립니다</p>
      </div>
      <div id="ob-major-cards" class="flex flex-col gap-3"></div>
    </div>

    <!-- Step 2: 소분류 선택 -->
    <div id="ob-step-2" class="flex flex-col gap-4">
      <button id="ob-back-btn" class="flex items-center gap-1 text-[#8e90a2] text-sm mb-2 self-start">
        <span class="material-symbols-outlined text-base">arrow_back</span> 다시 선택
      </button>
      <div class="mb-2">
        <h2 id="ob-step2-title" class="text-2xl font-bold text-[#e2e2e2] tracking-tight leading-tight"></h2>
        <p class="text-[#8e90a2] text-sm mt-1">세부 직무를 선택하세요</p>
      </div>
      <div id="ob-sub-list" class="flex flex-col gap-2"></div>
    </div>

  </div>
</div>
<!-- ===== END ONBOARDING OVERLAY ===== -->

<!-- TopAppBar -->
<header class="fixed top-0 left-0 right-0 z-50 bg-[#131313]/80 backdrop-blur-3xl flex justify-between items-center w-full px-6 pt-8 pb-4">
  <div class="flex items-center gap-4">
    <a href="index.html" class="flex items-center gap-4">
      <div>
        <h1 class="font-['Inter'] tracking-tighter font-bold text-[1.75rem] text-[#b8c3ff] leading-tight">자취방</h1>
        <p class="text-[#8e90a2] text-[0.6875rem] tracking-tight leading-none">자격증과 취준생의 방</p>
      </div>
    </a>
  </div>
  <div class="flex items-center gap-1">
    <button id="themeToggleBtn" title="테마 변경" class="p-1 rounded-full hover:bg-[#353535] transition-colors text-[#c4c5d9]">
      <span class="material-symbols-outlined text-3xl">light_mode</span>
    </button>
    <button id="feedbackBtn" title="피드백 보내기" class="p-1 rounded-full hover:bg-[#353535] transition-colors text-[#c4c5d9]">
      <span class="material-symbols-outlined text-3xl">feedback</span>
    </button>
  </div>
</header>

<main class="mt-28 px-4 space-y-3">

  <!-- Greeting Section -->
  <section id="greeting-section" class="pt-1">
    <div class="flex items-center justify-between">
      <div>
        <p id="greeting-sub" class="text-[#8e90a2] text-xs mb-0.5"></p>
        <h2 id="greeting-title" class="text-xl font-bold text-[#e2e2e2] tracking-tight leading-snug"></h2>
      </div>
      <button id="reset-prefs-btn" title="직무 다시 선택" class="text-[#434656] hover:text-[#8e90a2] transition-colors p-1">
        <span class="material-symbols-outlined text-xl">tune</span>
      </button>
    </div>
  </section>

  <!-- Bundle Section -->
  <section id="bundle-section" class="bg-[#1b1b1b] rounded-2xl overflow-hidden">
    <div class="flex items-center gap-2 px-5 pt-4 pb-3 border-b border-white/5">
      <span class="material-symbols-outlined text-[#b8c3ff] text-base">workspace_premium</span>
      <span class="text-sm font-bold text-[#e2e2e2] tracking-tight">직무 추천 자격증</span>
      <span id="bundle-job-label" class="text-[#434656] text-[10px] ml-auto font-medium"></span>
    </div>
    <div id="bundle-content" class="px-4 py-4 space-y-4">
      <div class="text-[#8e90a2] text-sm px-1 py-2">불러오는 중...</div>
    </div>
  </section>

  <!-- Deadline List -->
  <section class="bg-[#1b1b1b] rounded-2xl overflow-hidden">
    <div class="flex items-center gap-2 px-5 pt-4 pb-3 border-b border-white/5">
      <span class="material-symbols-outlined text-[#ffb4ab] text-base">alarm</span>
      <span class="text-sm font-bold text-[#e2e2e2] tracking-tight">접수 마감 임박</span>
      <span class="text-[#434656] text-[10px] ml-auto font-medium">접수 마감일 기준</span>
    </div>
    <div id="deadlineListItems" class="px-3 py-2">
      <div class="text-[#8e90a2] text-sm px-2 py-3">일정을 불러오는 중...</div>
    </div>
  </section>


</main>

<!-- BottomNavBar -->
<nav class="fixed bottom-8 left-0 right-0 z-50 flex justify-center px-4">
  <div class="bg-[#353535]/70 backdrop-blur-[30px] w-full max-w-md rounded-full px-2 py-2 flex justify-around items-center shadow-[0_20px_50px_rgba(0,0,0,0.5)]">
    <div class="flex flex-col items-center justify-center bg-[#2d5bff] text-white rounded-full px-5 py-2 cursor-pointer">
      <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;">home</span>
      <span class="text-[0.6875rem] font-medium">Home</span>
    </div>
    <a href="calendar.html" class="flex flex-col items-center justify-center text-[#c4c5d9] px-4 py-2 hover:text-white transition-colors">
      <span class="material-symbols-outlined">event_note</span>
      <span class="text-[0.6875rem] font-medium">Calendar</span>
    </a>
    <a href="certs.html" class="flex flex-col items-center justify-center text-[#c4c5d9] px-4 py-2 hover:text-white transition-colors">
      <span class="material-symbols-outlined">verified</span>
      <span class="text-[0.6875rem] font-medium">Certs</span>
    </a>
    <a href="my-certs.html" class="flex flex-col items-center justify-center text-[#c4c5d9] px-4 py-2 hover:text-white transition-colors">
      <span class="material-symbols-outlined">workspace_premium</span>
      <span class="text-[0.6875rem] font-medium">My Certs</span>
    </a>
  </div>
</nav>
