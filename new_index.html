<!DOCTYPE html>
<html class="dark" lang="ko"><head>
<script>(function(){var t=localStorage.getItem('theme');if(t==='light'){document.documentElement.classList.remove('dark');document.documentElement.classList.add('light');document.documentElement.style.backgroundColor='#f8f9fa';document.documentElement.style.color='#1a1a1a';}})();</script>
<script src="js/theme.js"></script>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>자취방 — 자격증 취준생의 방</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        "colors": {
          "inverse-surface": "#e2e2e2",
          "inverse-on-surface": "#303030",
          "on-tertiary": "#5b1a00",
          "on-secondary-fixed-variant": "#30418a",
          "on-primary-container": "#efefff",
          "surface": "#131313",
          "on-tertiary-fixed-variant": "#812900",
          "on-primary-fixed": "#001355",
          "on-secondary-container": "#a1b1ff",
          "primary-fixed-dim": "#b8c3ff",
          "outline-variant": "#434656",
          "secondary-fixed-dim": "#b8c3ff",
          "surface-container-high": "#2a2a2a",
          "primary-fixed": "#dde1ff",
          "on-background": "#e2e2e2",
          "surface-bright": "#393939",
          "error": "#ffb4ab",
          "secondary": "#b8c3ff",
          "background": "#131313",
          "tertiary": "#ffb59b",
          "surface-container": "#1f1f1f",
          "on-surface-variant": "#c4c5d9",
          "surface-container-low": "#1b1b1b",
          "on-tertiary-fixed": "#380d00",
          "on-secondary": "#162972",
          "outline": "#8e90a2",
          "surface-container-highest": "#353535",
          "surface-dim": "#131313",
          "surface-container-lowest": "#0e0e0e",
          "surface-tint": "#b8c3ff",
          "surface-variant": "#353535",
          "secondary-container": "#30418a",
          "tertiary-container": "#c24100",
          "tertiary-fixed-dim": "#ffb59b",
          "primary-container": "#2d5bff",
          "primary": "#b8c3ff",
          "on-surface": "#e2e2e2",
          "on-error": "#690005",
          "on-error-container": "#ffdad6",
          "inverse-primary": "#104af0",
          "on-tertiary-container": "#ffece6",
          "error-container": "#93000a",
          "tertiary-fixed": "#ffdbcf",
          "on-primary-fixed-variant": "#0035bd",
          "on-primary": "#002387",
          "secondary-fixed": "#dde1ff",
          "on-secondary-fixed": "#001355"
        },
        "borderRadius": {
          "DEFAULT": "1rem",
          "lg": "2rem",
          "xl": "3rem",
          "full": "9999px"
        },
        "fontFamily": {
          "headline": ["Inter"],
          "body": ["Inter"],
          "label": ["Inter"]
        }
      },
    },
  }
</script>
<style>
  body {
    background-color: #000000;
    font-family: 'Inter', sans-serif;
    color: #e2e2e2;
    min-height: max(884px, 100dvh);
  }
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  }
  .hide-scrollbar::-webkit-scrollbar { display: none; }
  .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
</style>
</head>
<body class="pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 right-0 z-50 bg-[#131313]/80 backdrop-blur-3xl flex justify-between items-center w-full px-6 pt-8 pb-4">
  <div class="flex items-center gap-4">
    <a href="index.html" class="flex items-center gap-4">
      <div>
        <h1 class="font-['Inter'] tracking-tighter font-bold text-[1.75rem] text-[#b8c3ff] leading-tight">자취방</h1>
        <p class="text-[#8e90a2] text-[0.6875rem] tracking-tight leading-none">자격증과 취준생의 방</p>
      </div>
    </a>
  </div>
  <div class="flex items-center gap-1">
    <button id="themeToggleBtn" title="테마 변경" class="p-1 rounded-full hover:bg-[#353535] transition-colors text-[#c4c5d9]">
      <span class="material-symbols-outlined text-3xl">light_mode</span>
    </button>
    <button id="feedbackBtn" title="피드백 보내기" class="p-1 rounded-full hover:bg-[#353535] transition-colors text-[#c4c5d9]">
      <span class="material-symbols-outlined text-3xl">feedback</span>
    </button>
  </div>
</header>

<main class="mt-28 px-4 space-y-3">

  <!-- Track Chip Row -->
  <section class="overflow-x-auto hide-scrollbar -mx-4 px-4">
    <div id="trackChipRow" class="flex gap-2 w-max pb-1"></div>
  </section>

  <!-- Featured Card -->
  <section class="relative overflow-hidden rounded-2xl cursor-pointer group" onclick="document.getElementById('featuredLink').click()">
    <div class="absolute inset-0 bg-gradient-to-br from-[#2d5bff]/20 via-[#14141e] to-[#131313]"></div>
    <div class="absolute top-0 left-0 right-0 h-px bg-gradient-to-r from-[#2d5bff] via-[#b8c3ff]/30 to-transparent"></div>
    <div class="relative px-5 py-5 flex flex-col gap-3.5">
      <!-- Top row: category badge + hover arrow -->
      <div class="flex items-center justify-between">
        <span id="featuredCat" class="px-2.5 py-0.5 bg-[#2d5bff]/20 border border-[#2d5bff]/40 text-[#b8c3ff] text-[10px] font-bold tracking-widest uppercase rounded-full">추천 자격증</span>
        <span class="material-symbols-outlined text-[#434656] text-base group-hover:text-[#b8c3ff] transition-colors">north_east</span>
      </div>
      <!-- Cert name + subtitle -->
      <div>
        <h3 id="featuredName" class="text-lg font-bold text-white leading-snug tracking-tight">오늘의 추천 자격증 로딩 중...</h3>
        <p id="featuredSub" class="text-[#8e90a2] text-xs mt-1 leading-relaxed">시험 일정을 불러오는 중입니다.</p>
      </div>
      <!-- Bottom row: D-day + button -->
      <div class="flex items-center justify-between pt-3 border-t border-white/5">
        <span id="featuredDDay" class="text-[#b8c3ff] text-sm font-bold tabular-nums"></span>
        <button id="featuredLink" class="bg-[#2d5bff] text-white px-4 py-1.5 rounded-full font-bold text-xs flex items-center gap-1 active:scale-95 duration-150">
          자세히 보기 <span class="material-symbols-outlined text-sm">arrow_forward</span>
        </button>
      </div>
    </div>
  </section>

  <!-- Study Timeline -->
  <section id="studyTimelineSection" class="bg-[#1b1b1b] rounded-2xl px-5 py-4">
    <div class="flex items-center gap-2 mb-3">
      <span class="material-symbols-outlined text-[#b8c3ff]" style="font-size:16px;">schedule</span>
      <span class="text-sm font-bold text-[#e2e2e2]">지금 시작하면?</span>
    </div>
    <div id="studyTimelineContent"><div class="text-[#8e90a2] text-xs">불러오는 중...</div></div>
  </section>

  <!-- Favorites card -->
  <a href="my-certs.html" class="bg-[#1b1b1b] rounded-2xl p-5 flex items-center justify-between hover:bg-[#222] transition-colors active:scale-[0.98] duration-150">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 flex items-center justify-center rounded-full bg-[#2d5bff]/15">
        <span class="material-symbols-outlined text-[#b8c3ff]" style="font-size:16px;">favorite</span>
      </div>
      <div>
        <span class="text-[10px] text-[#b8c3ff] font-bold tracking-wider uppercase">관심 자격증</span>
        <div id="favCountSub" class="text-[#8e90a2] text-xs mt-0.5">아직 관심 자격증이 없습니다</div>
      </div>
    </div>
    <div id="favCount" class="text-2xl font-black tracking-tighter text-white tabular-nums">0개</div>
  </a>

  <!-- Track Roadmap -->
  <section class="bg-[#1b1b1b] rounded-2xl overflow-hidden">
    <div class="flex items-center gap-2 px-5 pt-4 pb-3 border-b border-white/5">
      <span class="material-symbols-outlined text-[#b8c3ff] text-base">route</span>
      <span id="roadmapTitle" class="text-sm font-bold text-[#e2e2e2] tracking-tight">트랙 로드맵</span>
    </div>
    <div id="roadmapContent" class="px-5 py-4 space-y-3"></div>
  </section>

  <!-- Pass Rate -->
  <section class="bg-[#1b1b1b] rounded-2xl overflow-hidden">
    <div class="flex items-center gap-2 px-5 pt-4 pb-3 border-b border-white/5">
      <span class="material-symbols-outlined text-[#b8c3ff] text-base">percent</span>
      <span class="text-sm font-bold text-[#e2e2e2] tracking-tight">합격률 비교</span>
      <span id="passRateTrackLabel" class="text-[#434656] text-[10px] ml-auto font-medium"></span>
    </div>
    <div id="passRateContent" class="px-3 py-2"></div>
  </section>

  <!-- Deadline List -->
  <section class="bg-[#1b1b1b] rounded-2xl overflow-hidden mb-4">
    <div class="flex items-center gap-2 px-5 pt-4 pb-3 border-b border-white/5">
      <span class="material-symbols-outlined text-[#ffb4ab] text-base">alarm</span>
      <span class="text-sm font-bold text-[#e2e2e2] tracking-tight">접수 마감 임박</span>
      <span id="deadlineTrackLabel" class="text-[#434656] text-[10px] ml-auto font-medium">접수 마감일 기준</span>
    </div>
    <div id="deadlineListItems" class="px-3 py-2">
      <div class="text-[#8e90a2] text-sm px-2 py-3">일정을 불러오는 중...</div>
    </div>
  </section>

</main>

<!-- BottomNavBar -->
<nav class="fixed bottom-8 left-0 right-0 z-50 flex justify-center px-4">
  <div class="bg-[#353535]/70 backdrop-blur-[30px] w-full max-w-md rounded-full px-2 py-2 flex justify-around items-center shadow-[0_20px_50px_rgba(0,0,0,0.5)]">
    <div class="flex flex-col items-center justify-center bg-[#2d5bff] text-white rounded-full px-5 py-2 cursor-pointer">
      <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;">calendar_today</span>
      <span class="text-[0.6875rem] font-medium">Today</span>
    </div>
    <a href="calendar.html" class="flex flex-col items-center justify-center text-[#c4c5d9] px-4 py-2 hover:text-white transition-colors">
      <span class="material-symbols-outlined">event_note</span>
      <span class="text-[0.6875rem] font-medium">Calendar</span>
    </a>
    <a href="certs.html" class="flex flex-col items-center justify-center text-[#c4c5d9] px-4 py-2 hover:text-white transition-colors">
      <span class="material-symbols-outlined">verified</span>
      <span class="text-[0.6875rem] font-medium">Certs</span>
    </a>
    <a href="my-certs.html" class="flex flex-col items-center justify-center text-[#c4c5d9] px-4 py-2 hover:text-white transition-colors">
      <span class="material-symbols-outlined">workspace_premium</span>
      <span class="text-[0.6875rem] font-medium">My Certs</span>
    </a>
  </div>
</nav>

<script src="js/favorites.js"></script>
<script src="js/data.js"></script>
<script src="js/home.js"></script>
<script src="js/feedback.js"></script>
<script src="js/notice.js"></script>
</body></html>
