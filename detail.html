<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>자격증 상세 정보 | 자취방</title>
  <meta name="description" content="자격증 상세 정보와 연간 시험 일정을 확인하세요.">
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ===== 교재 카드 (여기서만 추가) ===== */
    .book-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .book-card {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      background: var(--clr-bg);
      border: 1px solid var(--clr-border);
      border-radius: var(--radius-md);
      padding: 14px;
      text-decoration: none;
      color: var(--clr-text);
      transition: var(--transition);
    }
    .book-card:hover {
      border-color: var(--clr-primary);
      background: var(--clr-primary-light);
      transform: translateY(-1px);
      box-shadow: var(--shadow-sm);
    }
    .book-cover {
      width: 60px;
      min-width: 60px;
      height: 84px;
      object-fit: cover;
      border-radius: 4px;
      border: 1px solid var(--clr-border);
      background: var(--clr-border);
    }
    .book-cover-placeholder {
      width: 60px;
      min-width: 60px;
      height: 84px;
      border-radius: 4px;
      border: 1px solid var(--clr-border);
      background: var(--clr-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }
    .book-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
      min-width: 0;
    }
    .book-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--clr-text);
      line-height: 1.4;
    }
    .book-meta {
      font-size: 12px;
      color: var(--clr-text-sub);
    }
    .book-link-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 6px;
      font-size: 11px;
      font-weight: 600;
      color: var(--clr-primary);
    }
    .book-no-link {
      margin-top: 6px;
      font-size: 11px;
      color: var(--clr-text-sub);
    }

    /* ===== 커리어패스 트리 (좌→우) ===== */
    .cp-tree { display: flex; flex-direction: row; align-items: flex-start; justify-content: space-between; gap: 0; overflow-x: auto; padding-bottom: 8px; }

    .cp-level {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 4px 8px;
      opacity: 0.38;
      transition: opacity 0.2s;
      flex: 1;
      min-width: 100px;
      flex-shrink: 0;
    }
    .cp-level--current,
    .cp-level--next { opacity: 1; }
    .cp-level--past  { opacity: 0.35; }

    .cp-level-label { text-align: center; }

    .cp-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 7px;
      border-radius: 99px;
      white-space: nowrap;
    }
    .cp-badge--entry { background: #e8f4fd; color: #2980b9; }
    .cp-badge--core  { background: #eaf4ee; color: #27ae60; }
    .cp-badge--adv   { background: #fdf0e8; color: #e67e22; }

    .cp-cards { display: flex; flex-direction: column; gap: 6px; align-items: center; width: 100%; }

    .cp-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1.5px solid var(--clr-border);
      background: #fff;
      text-decoration: none;
      color: var(--clr-text);
      font-size: 12px;
      font-weight: 500;
      cursor: default;
      width: 100%;
      box-sizing: border-box;
      text-align: center;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    a.cp-card { cursor: pointer; }
    a.cp-card:hover {
      border-color: var(--clr-primary);
      box-shadow: 0 2px 8px rgba(67,97,238,0.12);
    }
    .cp-card--self {
      border-color: var(--clr-primary);
      background: var(--clr-primary-light);
      color: var(--clr-primary);
      font-weight: 700;
    }
    .cp-card--recommended { border-color: #10b981; background: #f0fdf4; }

    .cp-card-tag {
      font-size: 10px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 99px;
      background: var(--clr-primary);
      color: #fff;
    }
    .cp-card-tag--next { background: #10b981; }

    .cp-arrow { color: #d1d5db; font-size: 20px; padding: 0 4px; align-self: center; flex-shrink: 0; }
    .cp-tip { margin-top: 16px; font-size: 13px; color: var(--clr-text-sub); text-align: center; }

    /* ===== 합격 기준 배지 ===== */
    .pass-badges-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }
    .pass-condition-box {
      background: var(--clr-primary-light);
      border: 1px solid #c7d2fe;
      border-radius: var(--radius-sm);
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 600;
      color: var(--clr-primary);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .pass-rate-badge {
      background: #ecfdf5;
      border: 1px solid #6ee7b7;
      border-radius: var(--radius-sm);
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 700;
      color: #065f46;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .pass-danger-badge {
      background: #fff7ed;
      border: 1px solid #fdba74;
      border-radius: var(--radius-sm);
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 600;
      color: #9a3412;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    /* ===== 시험 방식 배지 ===== */
    .exam-format-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }
    .exam-badge {
      background: var(--clr-bg);
      border: 1px solid var(--clr-border);
      border-radius: var(--radius-sm);
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 600;
      color: var(--clr-text);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .exam-badge--type {
      background: #eff6ff;
      border-color: #93c5fd;
      color: #1e40af;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="logo" id="logo">
        <div class="logo-icon">🏠</div>
        <div class="logo-text">
          <span class="logo-title">자취방</span>
          <span class="logo-sub">자격증 취준생의 방</span>
        </div>
      </a>
    </div>
  </header>

  <div class="detail-container" id="detailContainer">
    <div class="loading-overlay" id="loadingOverlay">
      <div class="loading-spinner"></div>
      <span>정보를 불러오는 중...</span>
    </div>
  </div>

  <div class="ad-banner-container detail-ad"></div>

  <footer class="site-footer">
    <div class="mobile-pc-hint">
      💻 PC나 태블릿에서 보시면 시험 일정을 캘린더로 더 편하게 확인할 수 있어요!
    </div>
    <p>© 2026 자취방. 시험 일정은 각 주관기관 공지를 반드시 확인하세요.</p>
    <p style="margin-top: 8px; font-size: 11px; opacity: 0.7; line-height: 1.4;">
      본 사이트에 사용된 자격증 명칭, 기관명 등의 지식재산권은 해당 주관기관에 귀속됩니다.<br>
      본 사이트는 구직자를 위한 정보 제공을 목적으로 운영되며, 수집된 일정의 오류에 대해 법적 책임을 지지 않습니다.
    </p>
  </footer>

  <script src="js/favorites.js"></script>
  <script>
    const INFO_ID_TO_NAME = {
      'sqld': 'SQLD', 'bigdata': '빅데이터분석기사', 'at-manager': '재경관리사',
      'at-accounting': '회계관리', 'tat-fat': 'TAT/FAT', 'erp-info': 'ERP정보관리사',
      'kofia-adv': '증권투자자권유자문인력', 'kofia-rep': '증권투자권유대행인',
      'kofia-im': '투자자산운용사', 'kofia-fa': '금융투자분석사',
      'kofia-frm': '재무위험관리사', 'lom-30': '물류관리사',
      'distributor': '유통관리사', 'sa-2': '사회조사분석사2급',
      'adsp': 'ADsP', 'tax-accounting': '전산세무회계', 'mca': '경영지도사',
    };

    document.addEventListener('DOMContentLoaded', initDetail);
    window.addEventListener('hashchange', initDetail);

    async function initDetail() {
      const id = window.location.hash.slice(1);
      if (!id) { showDetailError('잘못된 접근입니다. 메인 페이지로 돌아가세요.'); return; }
      document.getElementById('detailContainer').innerHTML = `
        <div class="loading-overlay" id="loadingOverlay">
          <div class="loading-spinner"></div>
          <span>정보를 불러오는 중...</span>
        </div>`;
      window.scrollTo(0, 0);
      try {
        const [infoList, examList, cpData] = await Promise.all([
          fetchJSON('./data/exam_info.json'),
          fetchJSON('./data/exams.json'),
          fetchJSON('./data/career_path.json'),
        ]);
        const info = infoList.find(item => item.id === id);
        if (!info) { showDetailError('해당 자격증 정보를 찾을 수 없습니다.'); return; }
        const examName = INFO_ID_TO_NAME[id] || info.name;
        const schedules = examList.filter(e => e.name === examName);
        renderDetail(info, schedules);
        document.title = `${info.name} | 상경계 자격증 캘린더`;

        // 커리어패스 섹션 렌더
        const cpEl = document.getElementById('career-path-container');
        if (cpEl) renderCareerPath(id, cpEl, cpData);

        // info-grid 커리어 레벨 배지
        const cpCert = cpData.certs.find(c => c.id === id);
        const badge  = document.getElementById('cp-level-badge');
        if (badge && cpCert) {
          const colorMap = { '입문': '#2980b9', '핵심': '#27ae60', '심화': '#e67e22' };
          const bgMap    = { '입문': '#e8f4fd', '핵심': '#eaf4ee', '심화': '#fdf0e8' };
          badge.innerHTML = `<span style="display:inline-block;padding:3px 10px;border-radius:99px;font-weight:700;font-size:13px;background:${bgMap[cpCert.level]};color:${colorMap[cpCert.level]};">${cpCert.level}</span>`;
        }
      } catch (err) {
        console.error('상세 페이지 로드 실패:', err);
        showDetailError('데이터를 불러오는 데 실패했습니다.');
      }
    }

    async function fetchJSON(path) {
      const res = await fetch(path);
      if (!res.ok) throw new Error(`HTTP ${res.status}: ${path}`);
      return res.json();
    }

    function getDifficultyClass(diff) {
      if (diff === '상' || diff === '최상') return 'difficulty-high';
      if (diff === '중' || diff === '중상') return 'difficulty-mid';
      return 'difficulty-low';
    }

    function renderPassBadges(info) {
      const badges = [];
      const raw = info.pass_condition || '';
      if (raw && raw.startsWith('TODO')) {
        badges.push(`<div class="pass-condition-box">${raw}</div>`);
      } else if (raw) {
        raw.split(/[\/,]/).map(p => p.trim()).filter(Boolean).forEach(part => {
          const isDanger = part.includes('과락') || part.includes('미만');
          const cls = isDanger ? 'pass-danger-badge' : 'pass-condition-box';
          const icon = isDanger ? '⚠️' : '✔';
          badges.push(`<div class="${cls}">${icon} ${part}</div>`);
        });
      }
      return `<div class="pass-badges-wrap">${badges.join('')}</div>`;
    }

    function renderExamFormat(info) {
      if (!info.exam_format) {
        return info.memo ? `<p>${info.memo}</p>` : '';
      }
      const f = info.exam_format;
      const badges = [];
      if (f.type) {
        const typeIcon = f.type === 'CBT' ? '🖥' : '📄';
        badges.push(`<div class="exam-badge exam-badge--type">${typeIcon} ${f.type}</div>`);
      }
      if (f.question_types && f.question_types.length) {
        f.question_types.forEach(qt => {
          badges.push(`<div class="exam-badge">${qt}</div>`);
        });
      }
      if (f.total_questions) {
        badges.push(`<div class="exam-badge">📝 ${f.total_questions}문항</div>`);
      }
      if (f.frequency) {
        badges.push(`<div class="exam-badge">🗓 ${f.frequency}</div>`);
      }
      return `<div class="exam-format-wrap">${badges.join('')}</div>`;
    }

    /* ===== 커리어패스 렌더링 ===== */
    async function renderCareerPath(certId, container, cpData) {
      if (!cpData) {
        try { cpData = await fetchJSON('./data/career_path.json'); }
        catch(e) { container.innerHTML = '<p style="color:var(--clr-text-sub);font-size:13px;">커리어패스 정보를 불러올 수 없습니다.</p>'; return; }
      }

      const LEVEL_ORDER = ['입문', '핵심', '심화'];
      const LEVEL_KEY   = { '입문': 'entry', '핵심': 'core', '심화': 'adv' };
      const LINKED_IDS  = new Set([
        'sqld','bigdata','at-manager','at-accounting','tat-fat','erp-info',
        'kofia-adv','kofia-rep','kofia-im','kofia-fa','kofia-frm','lom-30',
        'sa-2','adsp','distributor','tax-accounting','mca',
        'toeic','opic','toeic-speaking','com-2','com-1',
        'k-history','kbs-kr','k-kanji-1','k-kanji-2',
      ]);

      // 공용 카테고리 전용 그룹
      const COMMON_GROUPS = [
        { label: '영어', badge: 'entry', ids: ['toeic','opic','toeic-speaking'] },
        { label: '컴활', badge: 'core',  ids: ['com-2','com-1'] },
        { label: '어문', badge: 'adv',   ids: ['k-history','kbs-kr','k-kanji-1','k-kanji-2'] },
      ];

      const current = cpData.certs.find(c => c.id === certId);
      if (!current) {
        container.innerHTML = '<p style="color:var(--clr-text-sub);font-size:13px;">이 자격증의 커리어패스 정보가 준비 중입니다.</p>';
        return;
      }

      const currentLevelIdx = LEVEL_ORDER.indexOf(current.level);
      const nextLevel = LEVEL_ORDER[currentLevelIdx + 1] || null;
      const realCats  = current.category.filter(c => c !== '범용');

      let html = '';
      realCats.forEach((cat, ci) => {
        if (realCats.length > 1) html += `<div class="cp-category-label">${cat}</div>`;

        if (cat === '공용') {
          // 영어 / 컴활 / 어문 3개 병렬 트랙
          const myGroup = COMMON_GROUPS.find(g => g.ids.includes(certId));
          html += `<div class="cp-tree">`;
          COMMON_GROUPS.forEach(group => {
            const isMine = myGroup && group.label === myGroup.label;
            html += `<div class="cp-level${isMine ? ' cp-level--current' : ' cp-level--next'}">
              <div class="cp-level-label"><span class="cp-badge cp-badge--${group.badge}">${group.label}</span></div>
              <div class="cp-cards">
                ${group.ids.map(id => {
                  const cert = cpData.certs.find(c => c.id === id);
                  if (!cert) return '';
                  const isSelf = cert.id === certId;
                  const href   = LINKED_IDS.has(cert.id) ? `detail.html#${cert.id}` : null;
                  return `<${href ? `a href="${href}"` : 'span'} class="cp-card${isSelf ? ' cp-card--self' : ''}">
                    <span class="cp-card-name">${cert.name}</span>
                    ${isSelf ? '<span class="cp-card-tag">현재</span>' : ''}
                  </${href ? 'a' : 'span'}>`;
                }).join('')}
              </div>
            </div>`;
          });
          html += `</div>`;

        } else {
          // 기존 입문 → 핵심 → 심화 트리
          html += `<div class="cp-tree">`;
          LEVEL_ORDER.forEach((level, idx) => {
            const certs  = cpData.certs.filter(c => c.level === level && c.category.includes(cat));
            const isCur  = idx === currentLevelIdx;
            const isNext = level === nextLevel;
            const isPast = idx < currentLevelIdx;

            html += `<div class="cp-level${isCur?' cp-level--current':''}${isNext?' cp-level--next':''}${isPast?' cp-level--past':''}">
              <div class="cp-level-label"><span class="cp-badge cp-badge--${LEVEL_KEY[level]}">${level}</span></div>
              <div class="cp-cards">
                ${certs.map(cert => {
                  const isSelf = cert.id === certId;
                  const href   = LINKED_IDS.has(cert.id) ? `detail.html#${cert.id}` : null;
                  return `<${href?`a href="${href}"`:'span'} class="cp-card${isSelf?' cp-card--self':''}${isNext&&!isSelf?' cp-card--recommended':''}">
                    <span class="cp-card-name">${cert.name}</span>
                    ${isSelf?'<span class="cp-card-tag">현재</span>':''}
                    ${isNext&&!isSelf?'<span class="cp-card-tag cp-card-tag--next">추천</span>':''}
                  </${href?'a':'span'}>`;
                }).join('')}
              </div>
            </div>`;
            if (idx < LEVEL_ORDER.length - 1) html += `<div class="cp-arrow">→</div>`;
          });
          html += `</div>`;
        }

        if (ci < realCats.length - 1) html += `<div style="margin-bottom:20px;"></div>`;
      });

      if (current.level === '심화' && !current.category.includes('공용')) {
        html += `<p class="cp-tip">이 분야 최상위 자격증입니다. 🎯</p>`;
      }
      container.innerHTML = html;
    }

    function getStageBadge(stage) {
      if (stage === '필기') return '<span class="stage-badge stage-written">필기</span>';
      if (stage === '실기') return '<span class="stage-badge stage-practical">실기</span>';
      return '<span class="stage-badge stage-single">단일</span>';
    }

    function formatDate(dateStr) {
      if (!dateStr) return '-';
      const parts = dateStr.split('-');
      return `${parts[1]}.${parts[2]}`;
    }

    function formatCurrency(amount) {
      if (!amount && amount !== 0) return '-';
      return amount.toLocaleString('ko-KR') + '원';
    }

    /* ===== 교재 카드 렌더링 (새로 추가) ===== */
    function renderBookCards(books) {
      if (!books || books.length === 0) {
        return '<p style="color:var(--clr-text-sub);font-size:14px;">업데이트 예정</p>';
      }

      return `<div class="book-list">${books.map(book => {
        const hasLink = book.link && book.link.trim() !== '';
        const tag = hasLink ? 'a' : 'div';
        const linkAttr = hasLink ? `href="${book.link}" target="_blank" rel="noopener noreferrer"` : '';

        const coverHtml = (book.image && book.image.trim() !== '')
          ? `<img class="book-cover" src="${book.image}" alt="${book.title} 표지" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
             <div class="book-cover-placeholder" style="display:none;">📖</div>`
          : `<div class="book-cover-placeholder">📖</div>`;

        const badgeHtml = hasLink
          ? `<span class="book-link-badge">예스24에서 보기 →</span>`
          : `<span class="book-no-link">링크 준비 중</span>`;

        return `
          <${tag} class="book-card" ${linkAttr}>
            ${coverHtml}
            <div class="book-info">
              <div class="book-title">${book.title}</div>
              <div class="book-meta">${book.author} · ${book.publisher}</div>
              ${badgeHtml}
            </div>
          </${tag}>
        `;
      }).join('')}</div>`;
    }

    function renderDetail(info, schedules) {
      const container = document.getElementById('detailContainer');

      const subjectTags = info.subjects
        .split(',').map(s => `<span class="tag">${s.trim()}</span>`).join('');

      const scheduleRows = schedules.length > 0
        ? schedules.map((s, i) => `
            <tr>
              <td>${Math.ceil((i + 1) / (schedules.some(x => x.stage !== '단일') ? 2 : 1))}회</td>
              <td>${getStageBadge(s.stage)}</td>
              <td>${formatDate(s.registration_start)} ~ ${formatDate(s.registration_end)}</td>
              <td>${formatDate(s.exam_date)}</td>
              <td>${formatDate(s.result_date)}</td>
            </tr>`)
          .join('')
        : '<tr><td colspan="5" style="text-align:center;color:var(--clr-text-sub);padding:24px;">등록된 일정이 없습니다.</td></tr>';

      const host = schedules.length > 0 ? schedules[0].host : '-';
      const examUrl = schedules.length > 0 ? schedules[0].url : '#';

      container.innerHTML = `
        <a href="index.html" class="back-link">← 캘린더로 돌아가기</a>

        <div class="detail-hero">
          <div class="hero-titles">
            <div style="display:flex;align-items:center;gap:10px;">
              <h1>${info.name}</h1>
              <button class="fav-btn${isFavorite(info.name) ? ' fav-btn--active' : ''}" id="detail-fav-btn" data-name="${info.name}" aria-label="즐겨찾기 토글">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M12 21.593c-5.63-5.539-11-10.297-11-14.402 0-3.791 3.068-5.191 5.281-5.191 1.312 0 4.151.501 5.719 4.457 1.59-3.968 4.464-4.447 5.726-4.447 2.54 0 5.274 1.621 5.274 5.181 0 4.069-5.136 8.625-11 14.402z"/></svg>
              </button>
            </div>
            <div class="hero-meta">
              <span class="hero-badge">📋 ${host}</span>
            </div>
          </div>
          <a href="${examUrl}" target="_blank" rel="noopener noreferrer" class="btn-hero-apply">
            접수 사이트 바로가기
          </a>
        </div>

        <div class="info-grid">
          <div class="info-card">
            <div class="label">평균 준비 기간</div>
            <div class="value" style="font-size:14px;">${info.study_time || '업데이트 예정'}</div>
          </div>
          <div class="info-card">
            <div class="label">커리어패스 레벨</div>
            <div class="value" id="cp-level-badge" style="font-size:14px;">-</div>
          </div>
          <div class="info-card">
            <div class="label">주관기관</div>
            <div class="value" style="font-size:14px;">${host}</div>
          </div>
          <div class="info-card">
            <div class="label">응시료</div>
            <div class="value" style="font-size:14px;">${schedules.length > 0 && schedules[0].fee > 0 ? formatCurrency(schedules[0].fee) : '참고사항 확인'}</div>
          </div>
        </div>

        <div class="section-card">
          <h2><span class="icon">✅</span> 합격 기준</h2>
          ${renderPassBadges(info)}
        </div>

        <div class="section-card" id="career-path-section">
          <h2><span class="icon">🗺️</span> 커리어패스</h2>
          <div id="career-path-container">
            <p style="color:var(--clr-text-sub);font-size:14px;">불러오는 중...</p>
          </div>
        </div>

        <div class="section-card">
          <h2><span class="icon">📖</span> 시험 소개</h2>
          <p>${info.description}</p>
        </div>

        <div class="section-card">
          <h2><span class="icon">📚</span> 시험 과목</h2>
          <div class="tag-list">${subjectTags}</div>
        </div>

        <div class="section-card">
          <h2><span class="icon">📝</span> 시험 방식</h2>
          ${renderExamFormat(info)}
        </div>

        <div class="section-card">
          <h2><span class="icon">🗓️</span> 시험 일정</h2>
          ${(info.exam_format && info.exam_format.frequency && info.exam_format.frequency.includes('상시'))
            ? (examUrl && examUrl !== '#'
                ? `<p style="font-size:13px;color:var(--clr-text-sub);margin-bottom:14px;">상시 접수 가능합니다. 아래 링크에서 원하는 날짜를 직접 선택하세요.</p>
                   <a href="${examUrl}" target="_blank" rel="noopener noreferrer" class="btn-apply" style="justify-content:center;font-size:14px;padding:10px 20px;">
                     🗓️ 시험 일정 및 접수 바로가기
                   </a>`
                : `<p style="font-size:13px;color:var(--clr-text-sub);">상시 접수 가능합니다. 주관기관 사이트에서 일정을 확인하세요.</p>`)
            : `<div class="table-scroll">
                <table class="schedule-table">
                  <thead>
                    <tr>
                      <th>회차</th><th>구분</th><th>접수기간</th><th>시험일</th><th>합격발표</th>
                    </tr>
                  </thead>
                  <tbody>${scheduleRows}</tbody>
                </table>
              </div>`}
        </div>

        <div class="section-card">
          <h2><span class="icon">💬</span> 합격 후기 찾아보기</h2>
          <p style="font-size:13px;color:var(--clr-text-sub);margin-bottom:14px;">실제 수험생들의 경험이 가장 정확합니다.</p>
          <div style="display:flex;flex-direction:column;gap:8px;">
            <a href="https://www.youtube.com/results?search_query=${encodeURIComponent(info.name + ' 합격후기')}"
               target="_blank" rel="noopener noreferrer" class="btn-apply" style="justify-content:center;font-size:14px;padding:10px 20px;">
              ▶ 유튜브에서 합격 후기 보기
            </a>
            <a href="https://search.naver.com/search.naver?query=${encodeURIComponent(info.name + ' 합격후기')}"
               target="_blank" rel="noopener noreferrer" class="btn-apply" style="justify-content:center;font-size:14px;padding:10px 20px;background:linear-gradient(135deg,#03c75a,#02a94e);">
              🔍 네이버에서 합격 후기 보기
            </a>
          </div>
        </div>

        <div class="section-card" style="margin-bottom:0;">
          <h2><span class="icon">📗</span> 추천 교재</h2>
          ${renderBookCards(info.recommended_books)}
        </div>
      `;

      // 하트 버튼 이벤트 연결
      document.getElementById('detail-fav-btn')?.addEventListener('click', (e) => {
        const btn      = e.currentTarget;
        const isNowFav = toggleFavorite(btn.dataset.name);
        btn.classList.toggle('fav-btn--active', isNowFav);
      });
    }

    function showDetailError(message) {
      document.getElementById('detailContainer').innerHTML = `
        <a href="index.html" class="back-link">← 캘린더로 돌아가기</a>
        <div class="no-results"><div class="icon">⚠️</div><p>${message}</p></div>
      `;
    }
  </script>
</body>
</html>
