<!DOCTYPE html>
<html class="dark" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>자격증 탐색 | 자취방</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        "colors": {
          "surface-dim": "#131313",
          "surface-container-high": "#2a2a2a",
          "surface-container": "#1f1f1f",
          "tertiary-container": "#c24100",
          "surface-bright": "#393939",
          "on-primary-fixed": "#001355",
          "surface-tint": "#b8c3ff",
          "tertiary-fixed-dim": "#ffb59b",
          "secondary-fixed-dim": "#b8c3ff",
          "primary": "#b8c3ff",
          "outline-variant": "#434656",
          "tertiary-fixed": "#ffdbcf",
          "on-primary-fixed-variant": "#0035bd",
          "tertiary": "#ffb59b",
          "secondary-fixed": "#dde1ff",
          "inverse-primary": "#104af0",
          "on-error": "#690005",
          "on-background": "#e2e2e2",
          "surface-container-low": "#1b1b1b",
          "error": "#ffb4ab",
          "surface-container-lowest": "#0e0e0e",
          "inverse-on-surface": "#303030",
          "outline": "#8e90a2",
          "secondary": "#b8c3ff",
          "background": "#131313",
          "on-secondary-fixed-variant": "#30418a",
          "on-surface": "#e2e2e2",
          "on-primary": "#002387",
          "error-container": "#93000a",
          "primary-fixed": "#dde1ff",
          "surface": "#131313",
          "on-secondary": "#162972",
          "secondary-container": "#30418a",
          "on-secondary-container": "#a1b1ff",
          "on-surface-variant": "#c4c5d9",
          "inverse-surface": "#e2e2e2",
          "on-tertiary-fixed": "#380d00",
          "on-tertiary-container": "#ffece6",
          "on-primary-container": "#efefff",
          "surface-container-highest": "#353535",
          "primary-container": "#2d5bff",
          "surface-variant": "#353535",
          "on-secondary-fixed": "#001355",
          "on-error-container": "#ffdad6",
          "primary-fixed-dim": "#b8c3ff",
          "on-tertiary-fixed-variant": "#812900",
          "on-tertiary": "#5b1a00"
        },
        "borderRadius": {
          "DEFAULT": "1rem",
          "lg": "2rem",
          "xl": "3rem",
          "full": "9999px"
        },
        "fontFamily": { "headline": ["Inter"], "body": ["Inter"], "label": ["Inter"] }
      },
    },
  }
</script>
<style>
  body { background-color: #131313; font-family: 'Inter', sans-serif; color: #e2e2e2; -webkit-font-smoothing: antialiased; min-height: max(884px, 100dvh); }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .hide-scrollbar::-webkit-scrollbar { display: none; }
  .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
</style>
</head>
<body class="pb-32">

<!-- TopAppBar -->
<header class="fixed top-0 left-0 right-0 z-50 bg-[#131313]/80 backdrop-blur-3xl flex justify-between items-center w-full px-6 pt-8 pb-4">
  <div class="flex items-center gap-4">
    <a href="new_index.html" class="flex items-center gap-4">
      <div>
        <h1 class="font-['Inter'] tracking-tighter font-bold text-[1.75rem] text-[#b8c3ff] leading-tight">자취방</h1>
        <p class="text-[#8e90a2] text-[0.6875rem] tracking-tight leading-none">자격증과 취준생의 방</p>
      </div>
    </a>
  </div>
  <button id="feedbackBtn" title="피드백 보내기" class="p-1 rounded-full hover:bg-[#353535] transition-colors text-[#c4c5d9]">
    <span class="material-symbols-outlined text-3xl">feedback</span>
  </button>
</header>

<main class="mt-28 px-6 space-y-6 pb-4">
  <!-- Title + Count -->
  <div class="flex justify-between items-baseline">
    <h2 class="text-3xl font-extrabold tracking-tight text-on-surface">자격증 탐색</h2>
    <span class="text-on-surface-variant text-sm"><span id="certCount">-</span> 전체</span>
  </div>

  <!-- Search bar -->
  <div class="relative">
    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-sm">search</span>
    <input id="certSearch" type="text" placeholder="자격증 이름 검색..."
      class="w-full pl-10 pr-4 py-3 bg-surface-container-high rounded-xl text-on-surface placeholder-on-surface-variant text-sm focus:outline-none focus:ring-2 focus:ring-primary-container"/>
  </div>

  <!-- Category Filter Chips -->
  <div id="categoryFilters" class="flex gap-3 overflow-x-auto hide-scrollbar pb-1">
    <!-- Populated by certs.js -->
  </div>

  <!-- Cert Grid -->
  <div id="certGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div class="col-span-2 text-center text-on-surface-variant py-12">불러오는 중...</div>
  </div>
</main>

<!-- BottomNavBar -->
<nav class="fixed bottom-8 left-0 right-0 z-50 flex justify-center px-4">
  <div class="bg-[#353535]/70 backdrop-blur-[30px] w-full max-w-md rounded-full px-2 py-2 flex justify-around items-center shadow-[0_20px_50px_rgba(0,0,0,0.5)]">
    <a href="new_index.html" class="flex flex-col items-center justify-center text-[#c4c5d9] px-4 py-2 hover:text-white transition-colors">
      <span class="material-symbols-outlined">calendar_today</span>
      <span class="text-[0.6875rem] font-medium">Today</span>
    </a>
    <a href="calendar.html" class="flex flex-col items-center justify-center text-[#c4c5d9] px-4 py-2 hover:text-white transition-colors">
      <span class="material-symbols-outlined">event_note</span>
      <span class="text-[0.6875rem] font-medium">Calendar</span>
    </a>
    <div class="flex flex-col items-center justify-center bg-[#2d5bff] text-white rounded-full px-5 py-2 cursor-pointer">
      <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;">verified</span>
      <span class="text-[0.6875rem] font-medium">Certs</span>
    </div>
    <a href="my-certs.html" class="flex flex-col items-center justify-center text-[#c4c5d9] px-4 py-2 hover:text-white transition-colors">
      <span class="material-symbols-outlined">workspace_premium</span>
      <span class="text-[0.6875rem] font-medium">My Certs</span>
    </a>
  </div>
</nav>

<script src="../js/favorites.js"></script>
<script src="js/data.js"></script>
<script src="js/certs.js"></script>
<script src="js/feedback.js"></script>
</body></html>
