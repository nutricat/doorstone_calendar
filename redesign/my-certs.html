<style>
  body { font-family: 'Inter', sans-serif; background-color: #131313; color: #e2e2e2; min-height: max(884px, 100dvh); }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .squircle { border-radius: 3rem; }
  h1, h2, h3, p, span, button { word-break: keep-all; }
</style>
</head>
<body class="bg-background pb-32">

<!-- TopAppBar -->
<header class="fixed top-0 left-0 right-0 z-50 bg-[#131313]/80 backdrop-blur-3xl flex justify-between items-center w-full px-6 pt-8 pb-4">
  <div class="flex items-center gap-4">
    <a href="new_index.html" class="flex items-center gap-4">
      <div>
        <h1 class="font-['Inter'] tracking-tighter font-bold text-[1.75rem] text-[#b8c3ff] leading-tight">자취방</h1>
        <p class="text-[#8e90a2] text-[0.6875rem] tracking-tight leading-none">자격증과 취준생의 방</p>
      </div>
    </a>
  </div>
  <button id="feedbackBtn" title="피드백 보내기" class="p-1 rounded-full hover:bg-[#353535] transition-colors text-[#c4c5d9]">
    <span class="material-symbols-outlined text-3xl">feedback</span>
  </button>
</header>

<main class="mt-28 px-6 space-y-8">
  <!-- Hero: Favorites Summary -->
  <section class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <!-- Overall Count Card -->
    <div class="bg-surface-container-low squircle p-10 flex flex-col justify-between min-h-[280px]">
      <div>
        <span class="text-xs text-on-surface-variant uppercase tracking-widest font-bold">관심 자격증</span>
        <h2 class="font-bold text-on-surface mt-2 leading-tight text-3xl">
          <span id="favTotalSub">관심 자격증을 추가해보세요</span>
        </h2>
      </div>
      <div>
        <div class="flex items-baseline gap-2 mt-6 mb-2">
          <span id="favTotalCount" class="text-5xl font-black text-primary">총 0건</span>
        </div>
        <p class="text-on-surface-variant text-sm">캘린더 또는 자격증 상세에서 즐겨찾기로 추가하세요.</p>
      </div>
    </div>
    <!-- Upcoming Exam Mini Card -->
    <div class="bg-surface-container-high squircle p-8 flex items-center justify-between min-h-[140px]">
      <div>
        <span class="text-xs text-primary font-bold">가장 빠른 시험</span>
        <h3 id="upcomingExamName" class="text-xl font-bold mt-1">예정된 시험 없음</h3>
        <p id="upcomingExamDate" class="text-on-surface-variant text-sm"></p>
      </div>
      <div class="text-right ml-4 flex-shrink-0">
        <span id="upcomingExamDDay" class="text-4xl font-black text-primary-container leading-none">-</span>
      </div>
    </div>
  </section>

  <!-- Favorited Certs Section -->
  <section class="space-y-6">
    <div class="flex justify-between items-end px-2">
      <h2 class="text-2xl font-bold tracking-tight">관심 자격증</h2>
      <a href="calendar.html" class="text-primary text-sm font-bold">탐색하기</a>
    </div>
    <div id="favCertsList" class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <!-- Populated by my-certs.js -->
      <div class="col-span-3 text-center text-on-surface-variant py-8">불러오는 중...</div>
    </div>
  </section>
</main>

<!-- BottomNavBar -->
<nav class="fixed bottom-8 left-0 right-0 z-50 flex justify-center px-4">
  <div class="bg-[#353535]/70 backdrop-blur-[30px] w-full max-w-md rounded-full px-2 py-2 flex justify-around items-center shadow-[0_20px_50px_rgba(0,0,0,0.5)]">
    <a href="new_index.html" class="flex flex-col items-center justify-center text-[#c4c5d9] px-4 py-2 hover:text-white transition-colors">
      <span class="material-symbols-outlined">calendar_today</span>
      <span class="text-[0.6875rem] font-medium">Today</span>
    </a>
    <a href="calendar.html" class="flex flex-col items-center justify-center text-[#c4c5d9] px-4 py-2 hover:text-white transition-colors">
      <span class="material-symbols-outlined">event_note</span>
      <span class="text-[0.6875rem] font-medium">Calendar</span>
    </a>
    <a href="certs.html" class="flex flex-col items-center justify-center text-[#c4c5d9] px-4 py-2 hover:text-white transition-colors">
      <span class="material-symbols-outlined">verified</span>
      <span class="text-[0.6875rem] font-medium">Certs</span>
    </a>
    <div class="flex flex-col items-center justify-center bg-[#2d5bff] text-white rounded-full px-5 py-2 cursor-pointer">
      <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;">workspace_premium</span>
      <span class="text-[0.6875rem] font-medium">My Certs</span>
    </div>
  </div>
</nav>

<script src="../js/favorites.js"></script>
<script src="js/data.js"></script>
<script src="js/my-certs.js"></script>
<script src="js/feedback.js"></script>
<script src="js/notice.js"></script>
</body></html>
