<style>
  body { background-color: #000000; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; min-height: max(884px, 100dvh); }
  .korean-text { word-break: keep-all; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .hide-scrollbar::-webkit-scrollbar { display: none; }
  .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

  /* FullCalendar Dark Theme */
  .fc {
    --fc-border-color: #353535;
    --fc-today-bg-color: rgba(184, 195, 255, 0.08);
    --fc-event-bg-color: transparent;
    --fc-event-border-color: transparent;
    --fc-neutral-bg-color: #1f1f1f;
    --fc-page-bg-color: #1b1b1b;
    --fc-highlight-color: rgba(184, 195, 255, 0.1);
    --fc-list-event-hover-bg-color: #2a2a2a;
  }
  .fc .fc-toolbar { padding: 0 0 12px 0; flex-wrap: wrap; gap: 8px; }
  .fc .fc-toolbar-title { color: #b8c3ff; font-size: 1rem; font-weight: 700; }
  .fc .fc-button-group, .fc .fc-button { background: #2d5bff; border: none !important; box-shadow: none !important; font-size: 0.7rem; padding: 0.3rem 0.65rem; border-radius: 999px !important; color: #fff; font-weight: 600; }
  .fc .fc-button:hover { background: #1e4aff !important; }
  .fc .fc-button-active { background: #2d5bff !important; }
  .fc .fc-today-button { background: #353535 !important; color: #b8c3ff !important; }
  .fc .fc-col-header-cell-cushion { color: #8e90a2; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; padding: 8px 4px; text-decoration: none; }
  .fc .fc-daygrid-day-number { color: #e2e2e2; font-size: 0.8rem; padding: 4px 6px; text-decoration: none; }
  .fc .fc-day-today .fc-daygrid-day-number { color: #b8c3ff; font-weight: 700; }
  .fc .fc-scrollgrid { border: none !important; }
  .fc .fc-scrollgrid td, .fc .fc-scrollgrid th { border-color: #353535 !important; }
  .fc .fc-daygrid-day.fc-day-other .fc-daygrid-day-number { color: #434656; }
  .fc-event.event-reg-start { background: rgba(46,204,113,0.15) !important; border-left: 2px solid #2ecc71 !important; color: #2ecc71 !important; font-size: 0.68rem; }
  .fc-event.event-reg-end   { background: rgba(231,76,60,0.15)  !important; border-left: 2px solid #e74c3c !important; color: #e74c3c  !important; font-size: 0.68rem; }
  .fc-event.event-exam      { background: rgba(59,130,246,0.15) !important; border-left: 2px solid #3b82f6 !important; color: #3b82f6  !important; font-size: 0.68rem; }
  .fc .fc-daygrid-event { border-radius: 3px !important; padding: 1px 4px; margin: 0 1px 1px; cursor: pointer; }
  .fc .fc-more-link { color: #b8c3ff; font-size: 0.68rem; }
  .fc .fc-popover { background: #2a2a2a; border: 1px solid #353535; border-radius: 12px; }
  .fc .fc-popover-title { background: #353535; color: #e2e2e2; padding: 8px 12px; border-radius: 12px 12px 0 0; }
  .fc .fc-popover-close { color: #8e90a2; }
</style>

<body class="text-on-surface">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 right-0 z-50 bg-[#131313]/80 backdrop-blur-3xl flex justify-between items-center w-full px-6 pt-8 pb-4">
  <div class="flex items-center gap-4">
    <a href="new_index.html" class="flex items-center gap-4">
      <div>
        <h1 class="font-['Inter'] tracking-tighter font-bold text-[1.75rem] text-[#b8c3ff] leading-tight">자취방</h1>
        <p class="text-[#8e90a2] text-[0.6875rem] tracking-tight leading-none">자격증과 취준생의 방</p>
      </div>
    </a>
  </div>
  <div class="flex items-center gap-1">
    <button id="themeToggleBtn" title="테마 변경" class="p-1 rounded-full hover:bg-[#353535] transition-colors text-[#c4c5d9]">
      <span class="material-symbols-outlined text-3xl">light_mode</span>
    </button>
    <button id="feedbackBtn" title="피드백 보내기" class="p-1 rounded-full hover:bg-[#353535] transition-colors text-[#c4c5d9]">
      <span class="material-symbols-outlined text-3xl">feedback</span>
    </button>
  </div>
</header>

<main class="pt-28 pb-32 px-4 max-w-2xl mx-auto space-y-4">
  <!-- Search bar -->
  <div class="relative pt-2">
    <div class="relative">
      <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-sm">search</span>
      <input id="calendarSearch" type="text" placeholder="자격증 검색..." class="w-full pl-10 pr-4 py-3 bg-surface-container-high rounded-xl text-on-surface placeholder-on-surface-variant text-sm focus:outline-none focus:ring-2 focus:ring-primary-container"/>
    </div>
    <ul id="calendarSearchDropdown" class="hidden absolute left-0 right-0 top-full mt-1 bg-surface-container-high rounded-xl border border-outline-variant/30 z-20 overflow-hidden shadow-2xl max-h-48 overflow-y-auto"></ul>
  </div>

  <!-- Category Filter Chips -->
  <div id="categoryFilters" class="flex gap-3 overflow-x-auto hide-scrollbar pb-1">
    <!-- Populated by calendar.js -->
  </div>

  <!-- FullCalendar Mount -->
  <section class="bg-surface-container-low rounded-2xl p-4 shadow-2xl">
    <div id="calendar"></div>
    <!-- Legend -->
    <div class="mt-4 pt-3 border-t border-outline-variant/10 flex items-center gap-4 justify-center flex-wrap">
      <div class="flex items-center gap-1.5">
        <span class="w-2 h-2 rounded-full bg-[#2ecc71] inline-block"></span>
        <span class="text-[10px] text-on-surface-variant font-medium korean-text">접수 시작</span>
      </div>
      <div class="flex items-center gap-1.5">
        <span class="w-2 h-2 rounded-full bg-[#e74c3c] inline-block"></span>
        <span class="text-[10px] text-on-surface-variant font-medium korean-text">접수 마감</span>
      </div>
      <div class="flex items-center gap-1.5">
        <span class="w-2 h-2 rounded-full bg-[#3b82f6] inline-block"></span>
        <span class="text-[10px] text-on-surface-variant font-medium korean-text">시험일</span>
      </div>
    </div>
  </section>

  <!-- Schedule List -->
  <section class="bg-[#1b1b1b] rounded-2xl overflow-hidden">
    <div class="flex items-center gap-2 px-5 pt-4 pb-3 border-b border-white/5">
      <span class="material-symbols-outlined text-[#b8c3ff] text-base">event_note</span>
      <span id="scheduleListTitle" class="text-sm font-bold text-[#e2e2e2] tracking-tight">이번 달 일정</span>
    </div>
    <div id="scheduleList" class="px-3 py-2">
      <div class="text-[#8e90a2] text-sm px-2 py-3">일정을 불러오는 중...</div>
    </div>
  </section>
</main>

<!-- BottomNavBar -->
<nav class="fixed bottom-8 left-0 right-0 z-50 flex justify-center px-4">
  <div class="bg-[#353535]/70 backdrop-blur-[30px] w-full max-w-md rounded-full px-2 py-2 flex justify-around items-center shadow-[0_20px_50px_rgba(0,0,0,0.5)]">

    <div class="flex flex-col items-center justify-center bg-[#2d5bff] text-white rounded-full px-5 py-2 cursor-pointer">
      <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;">event_note</span>
      <span class="text-[0.6875rem] font-medium">Calendar</span>
    </div>
    <a href="certs.html" class="flex flex-col items-center justify-center text-[#c4c5d9] px-4 py-2 hover:text-white transition-colors">
      <span class="material-symbols-outlined">verified</span>
      <span class="text-[0.6875rem] font-medium">Certs</span>
    </a>
    <a href="my-certs.html" class="flex flex-col items-center justify-center text-[#c4c5d9] px-4 py-2 hover:text-white transition-colors">
      <span class="material-symbols-outlined">workspace_premium</span>
      <span class="text-[0.6875rem] font-medium">My Certs</span>
    </a>
  </div>
</nav>

<script src="../js/favorites.js"></script>
<script src="js/data.js"></script>
